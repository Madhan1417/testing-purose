name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Public EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /home/ubuntu/testing-purose
            cd /home/ubuntu/testing-purose
            git fetch origin
            git reset --hard origin/master
            pm2 stop app || true
            pm2 start /home/ubuntu/testing-purose/backend/app.js --name app
            sudo systemctl restart nginx
            echo "Deployed successfully!"
