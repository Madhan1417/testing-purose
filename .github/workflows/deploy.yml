name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Public EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          request_pty: true
          script: |
            sudo chown -R ubuntu:ubuntu /home/ubuntu/testing-purose
            cd /home/ubuntu/testing-purose
            git fetch origin
            git reset --hard origin/master
            pkill -f "node app.js" || true
            sleep 1
            nohup node /home/ubuntu/testing-purose/backend/app.js > /home/ubuntu/testing-purose/backend/nohup.out 2>&1 &
            disown
            sudo systemctl restart nginx
            echo "Deployed successfully!"
