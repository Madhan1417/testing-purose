
name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/testing-purose
            git fetch origin
            git reset --hard origin/master
            pm2 stop app || true
            pm2 start /home/ubuntu/testing-purose/backend/app.js --name app
            echo "Backend deployed successfully!"
