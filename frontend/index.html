<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #2c3e50;
        }

        button {
            padding: 12px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #result {
            margin-top: 30px;
            font-size: 18px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h1>🚀 Frontend Running Successfully</h1>

    <p>Frontend served through Nginx container inside Azure Container Apps.</p>

    <button onclick="callBackend()">
        Connect Backend
    </button>

    <div id="result"></div>

    <script>

        async function callBackend() {

            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = "⏳ Connecting to backend...";

            try {

                const response = await fetch(
                    'https://backend-app.thankfulcoast-68c7876b.eastus.azurecontainerapps.io/',
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();

                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Backend Response</h3>
                        <p><strong>Message:</strong> ${data.message}</p>
                        <p><strong>Status:</strong> ${data.status}</p>
                    </div>
                `;

            } catch (error) {

                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ Backend connection failed
                        <br><br>
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;

                console.error("Backend Error:", error);
            }
        }

    </script>

</body>

</html>
